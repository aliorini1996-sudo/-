name: FieldSales — بريد تلقائي للعملاء المحتملين

# يرسل دفعة بريد تسويقي كل ساعتين — بلا توقّف حتى بلوغ الحدّ اليومي.
# لا يتطلّب أسراراً: يكفي تفعيل «البريد التلقائي 24/7» من لوحة المالك (enabled=true).
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: إرسال دفعة بريد
        env:
          TOKEN: ${{ secrets.AUTO_HUNT_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            https://api.fieldsa.net/api/leads-cron/email \
            -H "x-autohunt-token: ${TOKEN}" \
            --max-time 300)
          echo "HTTP $code"
          cat /tmp/out.json; echo ""
          if [ "$code" != "200" ]; then
            echo "::error::استجابة غير متوقّعة ($code)."
            exit 1
          fi
          if grep -q '"skipped":true' /tmp/out.json; then
            echo "ℹ️ تُخطّيت (متوقّف أو دفعة حديثة) — طبيعي."
          else
            sent=$(python3 -c "import json;print(json.load(open('/tmp/out.json'))['data']['sent'])" 2>/dev/null || echo '?')
            echo "✅ أُرسل: $sent بريد."
          fi
