name: FieldSales — صيد مستمر للعملاء المحتملين

# يشغّل دفعة صيد كل 30 دقيقة — يجمع تلقائياً بلا توقّف 24/7.
# لا يتطلّب أي أسرار: يكفي تفعيل «الصيد التلقائي 24/7» من لوحة المالك (enabled=true).
# (اختياري) إن ضُبط AUTO_HUNT_TOKEN في الخادم + كسرّ هنا، يُرسَل للتحقّق الإضافي.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: تشغيل دفعة صيد
        env:
          TOKEN: ${{ secrets.AUTO_HUNT_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            https://api.fieldsa.net/api/leads-cron/run \
            -H "x-autohunt-token: ${TOKEN}" \
            --max-time 300)
          echo "HTTP $code"
          cat /tmp/out.json; echo ""
          if [ "$code" != "200" ]; then
            echo "::error::استجابة غير متوقّعة ($code) من الخادم."
            exit 1
          fi
          if grep -q '"skipped":true' /tmp/out.json; then
            echo "ℹ️ تُخطّيت الدفعة (متوقّف أو دفعة حديثة) — طبيعي."
          else
            imported=$(python3 -c "import json;print(json.load(open('/tmp/out.json'))['data']['imported'])" 2>/dev/null || echo '?')
            echo "✅ تمت دفعة الصيد — أُضيف: $imported عميل."
          fi
