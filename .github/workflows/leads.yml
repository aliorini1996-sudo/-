name: FieldSales — صيد العملاء المحتملين

on:
  schedule:
    # 05:00 UTC = 8:00 صباحًا بتوقيت السعودية
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fieldsales-leads
  cancel-in-progress: false

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r leads/requirements.txt

      - name: Find & store leads
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python leads/find_leads.py
