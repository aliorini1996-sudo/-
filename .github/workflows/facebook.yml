name: FieldSales — تسويق فيسبوك اليومي

on:
  schedule:
    # 6 مرّات يوميًا بأوقات متفرّقة بتوقيت السعودية (UTC+3)
    - cron: "0 6 * * *"    # 9:00 صباحًا
    - cron: "0 9 * * *"    # 12:00 ظهرًا
    - cron: "0 12 * * *"   # 3:00 عصرًا
    - cron: "0 15 * * *"   # 6:00 مساءً
    - cron: "0 17 * * *"   # 8:00 مساءً (ذروة المساء)
    - cron: "0 19 * * *"   # 10:00 مساءً
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fieldsales-facebook
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r marketing/requirements.txt

      - name: Install headless browser
        run: python -m playwright install --with-deps chromium

      - name: Generate & post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python marketing/facebook_post.py
