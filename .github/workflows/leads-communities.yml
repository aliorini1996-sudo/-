name: FieldSales — بحث المجتمعات/القروبات

# يبحث عن قروبات ومجتمعات المهتمين بالتوزيع كل ساعة — بلا توقّف 24/7.
# لا يتطلّب أسراراً: يكفي تفعيل «البحث التلقائي» من لوحة المالك (enabled=true).
on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  communities:
    runs-on: ubuntu-latest
    steps:
      - name: دفعة بحث مجتمعات
        env:
          TOKEN: ${{ secrets.AUTO_HUNT_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            https://api.fieldsa.net/api/leads-cron/community \
            -H "x-autohunt-token: ${TOKEN}" \
            --max-time 300)
          echo "HTTP $code"
          cat /tmp/out.json; echo ""
          if [ "$code" != "200" ]; then echo "::error::استجابة غير متوقّعة ($code)."; exit 1; fi
          if grep -q '"skipped":true' /tmp/out.json; then
            echo "ℹ️ تُخطّيت (متوقّف أو دفعة حديثة) — طبيعي."
          else
            imported=$(python3 -c "import json;print(json.load(open('/tmp/out.json'))['data']['imported'])" 2>/dev/null || echo '?')
            echo "✅ اكتُشف: $imported قروب/مجتمع."
          fi
