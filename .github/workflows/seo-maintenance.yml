name: SEO Maintenance

# صيانة SEO ذاتية التشغيل:
# - تعمل يومياً تلقائياً (GitHub) لتحديث خريطة الموقع بأي مقالات جديدة أُضيفت من لوحة السوبر أدمن
# - تدقّق صحّة الـSEO وتنبّه عند أي تراجع
# - يمكن تشغيلها يدوياً، وتعمل أيضاً عند تغيّر المدوّنة
on:
  schedule:
    - cron: '0 3 * * *'   # كل يوم 03:00 UTC (06:00 بتوقيت السعودية)
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'web-admin/src/blog/**'
      - 'web-admin/scripts/gen-sitemap.mjs'

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # يجلب المقالات الحيّة من الـCMS العام ويعيد توليد الخريطة مع hreflang (بلا حاجة لتثبيت حزم)
      - name: تحديث خريطة الموقع من المحتوى الحيّ
        run: node scripts/gen-sitemap.mjs

      # يلتزم بالخريطة إن تغيّرت (مقال جديد مثلاً) — ما يطلق النشر المعتاد
      - name: التزام الخريطة عند تغيّرها
        run: |
          if ! git diff --quiet public/sitemap.xml; then
            git config user.name "fieldsa-seo-bot"
            git config user.email "seo-bot@users.noreply.github.com"
            git add public/sitemap.xml
            git commit -m "chore(seo): تحديث خريطة الموقع تلقائياً [skip ci]"
            git push
            echo "✅ تم تحديث خريطة الموقع."
          else
            echo "لا تغييرات في خريطة الموقع."
          fi

      # تدقيق صحّة الـSEO — يُفشِل المهمّة عند وجود أخطاء فيصل تنبيه من GitHub
      - name: تدقيق الـSEO
        run: node scripts/seo-audit.mjs
