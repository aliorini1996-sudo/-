name: SEO Maintenance

# صيانة SEO + GEO ذاتية التشغيل:
# - تعمل يومياً تلقائياً (GitHub) لتحديث خريطة الموقع وllms.txt بأي مقالات جديدة أُضيفت من لوحة السوبر أدمن
# - تدقّق صحّة الـSEO والـGEO (الظهور في محركات الذكاء الاصطناعي) وتنبّه عند أي تراجع
# - يمكن تشغيلها يدوياً، وتعمل أيضاً عند تغيّر المدوّنة
on:
  schedule:
    - cron: '0 3 * * *'   # كل يوم 03:00 UTC (06:00 بتوقيت السعودية)
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'web-admin/src/blog/**'
      - 'web-admin/scripts/gen-sitemap.mjs'
      - 'web-admin/scripts/gen-llms.mjs'
      - 'web-admin/scripts/geo-audit.mjs'

permissions:
  contents: write

jobs:
  seo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # يجلب المقالات الحيّة من الـCMS العام ويعيد توليد الخريطة مع hreflang (بلا حاجة لتثبيت حزم)
      - name: تحديث خريطة الموقع من المحتوى الحيّ
        run: node scripts/gen-sitemap.mjs

      # يعيد توليد دليل الذكاء الاصطناعي llms.txt + الفهرس الكامل من نفس المصدر (GEO)
      - name: تحديث llms.txt من المحتوى الحيّ
        run: node scripts/gen-llms.mjs

      # يلتزم بالملفات المولّدة إن تغيّرت (مقال جديد مثلاً) — ما يطلق النشر المعتاد
      # وعند تغيّر الخريطة يُشعر IndexNow فوراً (فهرس Bing يغذّي ChatGPT/Copilot/DuckDuckGo)
      - name: التزام الملفات المولّدة عند تغيّرها
        run: |
          if ! git diff --quiet public/sitemap.xml public/llms.txt public/llms-full.txt; then
            SITEMAP_CHANGED=$(git diff --quiet public/sitemap.xml && echo no || echo yes)
            git config user.name "fieldsa-seo-bot"
            git config user.email "seo-bot@users.noreply.github.com"
            git add public/sitemap.xml public/llms.txt public/llms-full.txt
            git commit -m "chore(seo): تحديث الخريطة وllms.txt تلقائياً [skip ci]"
            git push
            echo "✅ تم تحديث الملفات المولّدة."
            if [ "$SITEMAP_CHANGED" = "yes" ]; then
              node scripts/indexnow.mjs || echo "⚠️ فشل إشعار IndexNow (غير مانع)"
            fi
          else
            echo "لا تغييرات في الملفات المولّدة."
          fi

      # تدقيق صحّة الـSEO — يُفشِل المهمّة عند وجود أخطاء فيصل تنبيه من GitHub
      - name: تدقيق الـSEO
        run: node scripts/seo-audit.mjs

      # تدقيق صحّة الـGEO (الظهور في محركات الذكاء الاصطناعي)
      - name: تدقيق الـGEO
        run: node scripts/geo-audit.mjs
