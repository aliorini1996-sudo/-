name: FieldSales — تسويق LinkedIn اليومي

on:
  schedule:
    # 3 مرّات يوميًا بتوقيت السعودية (UTC+3): 9 صباحًا · 5 مساءً · 8 مساءً
    - cron: "0 6 * * *"    # 9:00 صباحًا
    - cron: "0 14 * * *"   # 5:00 مساءً
    - cron: "0 17 * * *"   # 8:00 مساءً
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fieldsales-linkedin
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r marketing/requirements.txt

      - name: Install headless browser
        run: python -m playwright install --with-deps chromium

      - name: Generate & post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python marketing/linkedin_post.py
