name: FieldSales — تسويق LinkedIn اليومي

on:
  schedule:
    # 08:00 UTC = 11:00 صباحًا بتوقيت السعودية (وقت تفاعل مهني جيّد على LinkedIn)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: fieldsales-linkedin
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r marketing/requirements.txt

      - name: Install headless browser
        run: python -m playwright install --with-deps chromium

      - name: Generate & post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
        run: python marketing/linkedin_post.py
