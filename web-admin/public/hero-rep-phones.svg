    <rect x="108" y="330" width="26" height="26" rx="8" fill="#E3D9F5"/><rect x="114" y="337" width="14" height="10" rx="2" stroke="#7C5CBF" stroke-width="1.4" fill="none"/><path d="M114 341h14" stroke="#7C5CBF" stroke-width="1.4"/>
