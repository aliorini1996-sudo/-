    <rect x="242" y="330" width="26" height="26" rx="8" fill="#F8DFC2"/><path d="M249 337h9v11h-9zm2 3h5m-5 3h5" stroke="#D97A2B" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <text x="266" y="372" font-size="15" font-weight="800" fill="#D97A2B" text-anchor="end">٨</text>
    <text x="266" y="348" font-size="9" fill="#A8703A" text-anchor="end">الفواتير</text>
    <!-- سندات القبض (يسار) -->
