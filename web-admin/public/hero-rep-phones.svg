<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="720" viewBox="0 0 1060 720" font-family="'IBM Plex Sans Arabic','IBM Plex Sans','Segoe UI','Tajawal',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2019"/>
      <stop offset="0.55" stop-color="#211913"/>
      <stop offset="1" stop-color="#15110D"/>
    </linearGradient>
    <radialGradient id="glowCoral" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E15A30" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E15A30" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1E7A52" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#1E7A52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E0A02C" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#E0A02C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greet" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E15A30"/>
      <stop offset="1" stop-color="#1F1A13"/>
    </linearGradient>
    <linearGradient id="greetEn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E15A30"/>
      <stop offset="1" stop-color="#1F1A13"/>
    </linearGradient>
    <filter id="ph" x="-40%" y="-40%" width="180%" height="180%">
