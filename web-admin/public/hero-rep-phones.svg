    <rect x="242" y="254" width="26" height="26" rx="8" fill="#F6D5C7"/><path d="M248 272l6-7 4 3 6-8" stroke="#E15A30" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="266" y="296" font-size="15" font-weight="800" fill="#E15A30" text-anchor="end">٤٬٢٥٠</text>
    <text x="266" y="272" font-size="9" fill="#8A5B45" text-anchor="end">المبيعات</text>
    <!-- تحصيل اليوم (يسار) -->
