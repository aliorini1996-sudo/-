    <rect x="108" y="254" width="26" height="26" rx="8" fill="#D3EEDF"/><path d="M114 265v10m6-13v13m-9-10h12" stroke="#1E7A52" stroke-width="1.6" stroke-linecap="round"/>
    <text x="132" y="296" font-size="15" font-weight="800" fill="#1E7A52" text-anchor="end">٢٬١٠٠</text>
    <text x="132" y="272" font-size="9" fill="#5E8A73" text-anchor="end">تحصيل اليوم</text>
    <!-- الفواتير (يمين) -->
