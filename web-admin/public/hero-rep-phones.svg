    </filter>
  </defs>

  <!-- الخلفية -->
  <rect width="1060" height="720" rx="30" fill="url(#bg)"/>
  <ellipse cx="880" cy="90" rx="360" ry="300" fill="url(#glowCoral)"/>
  <ellipse cx="120" cy="640" rx="340" ry="300" fill="url(#glowGreen)"/>
  <ellipse cx="230" cy="70" rx="240" ry="200" fill="url(#glowAmber)"/>

  <!-- رمز الهوية: المسار الصاعد (أكسسوار خلفي) -->
  <g opacity="0.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
