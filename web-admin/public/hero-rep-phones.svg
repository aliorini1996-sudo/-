    <!-- رصيد التحصيل -->
    <rect x="20" y="152" width="260" height="70" rx="18" fill="#F3FBF7" stroke="#CFEEDF" stroke-width="1.4"/>
    <rect x="234" y="172" width="34" height="34" rx="11" fill="#E1F4EA"/><rect x="242" y="182" width="18" height="13" rx="3" fill="none" stroke="#1E7A52" stroke-width="1.6"/><circle cx="256" cy="188" r="1.6" fill="#1E7A52"/>
    <text x="220" y="176" font-size="10.5" fill="#6E6557" text-anchor="end">رصيد التحصيل لديك</text>
    <text x="220" y="198" font-size="17" font-weight="800" fill="#1E7A52" text-anchor="end">٩٬٧٥٥٫٠٠ ر.س</text>
    <text x="220" y="213" font-size="8.5" fill="#9A8F7E" text-anchor="end">المبلغ الذي عليك تسليمه للإدارة</text>

    <!-- إحصائيات اليوم -->
    <text x="280" y="250" font-size="13.5" font-weight="800" fill="#1F1A13" text-anchor="end">إحصائيات اليوم</text>
    <g>
      <!-- المبيعات (يمين-أعلى) -->
      <rect x="158" y="262" width="122" height="76" rx="17" fill="#FBEBE2"/><rect x="244" y="272" width="26" height="26" rx="8" fill="#F6D5C7"/><path d="M250 290l6-7 4 3 6-8" stroke="#E15A30" stroke-width="2" fill="none" stroke-linecap="round"/><text x="270" y="318" font-size="14.5" font-weight="800" fill="#E15A30" text-anchor="end">٤٤٤٫٩٩</text><text x="270" y="331" font-size="9" fill="#8A5B45" text-anchor="end">المبيعات</text>
      <!-- تحصيل اليوم (يسار-أعلى) -->
      <rect x="20" y="262" width="122" height="76" rx="17" fill="#EAF7F0"/><rect x="106" y="272" width="26" height="26" rx="8" fill="#D3EEDF"/><rect x="112" y="280" width="14" height="10" rx="2" fill="none" stroke="#1E7A52" stroke-width="1.5"/><text x="132" y="318" font-size="14.5" font-weight="800" fill="#1E7A52" text-anchor="end">٥٨٠٫٠٠</text><text x="132" y="331" font-size="9" fill="#5E8A73" text-anchor="end">تحصيل اليوم</text>
      <!-- الفواتير (يمين-أسفل) -->
      <rect x="158" y="346" width="122" height="76" rx="17" fill="#FEF1E3"/><rect x="244" y="356" width="26" height="26" rx="8" fill="#F8DFC2"/><path d="M251 363h9v11h-9zm2 3h5m-5 3h5" stroke="#D97A2B" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="270" y="404" font-size="16" font-weight="800" fill="#D97A2B" text-anchor="end">٢</text><text x="270" y="417" font-size="9" fill="#A8703A" text-anchor="end">الفواتير</text>
      <!-- سندات القبض (يسار-أسفل) -->
      <rect x="20" y="346" width="122" height="76" rx="17" fill="#F3EEFB"/><rect x="106" y="356" width="26" height="26" rx="8" fill="#E3D9F5"/><rect x="112" y="363" width="14" height="10" rx="2" fill="none" stroke="#7C5CBF" stroke-width="1.4"/><path d="M112 367h14" stroke="#7C5CBF" stroke-width="1.4"/><text x="132" y="404" font-size="16" font-weight="800" fill="#7C5CBF" text-anchor="end">٣</text><text x="132" y="417" font-size="9" fill="#6B57A0" text-anchor="end">سندات القبض</text>
    </g>

    <!-- إجراءات سريعة -->
    <text x="280" y="450" font-size="13.5" font-weight="800" fill="#1F1A13" text-anchor="end">إجراءات سريعة</text>
    <g text-anchor="middle">
      <rect x="200" y="462" width="80" height="62" rx="15" fill="#FBEBE2"/><path d="M233 476h9l4 4v12h-13z" fill="none" stroke="#E15A30" stroke-width="1.6" stroke-linejoin="round"/><text x="240" y="514" font-size="10" font-weight="700" fill="#E15A30">فاتورة</text>
      <rect x="110" y="462" width="80" height="62" rx="15" fill="#EAF7F0"/><rect x="140" y="477" width="20" height="14" rx="2.5" fill="none" stroke="#1E7A52" stroke-width="1.6"/><path d="M140 482h20" stroke="#1E7A52" stroke-width="1.6"/><text x="150" y="514" font-size="10" font-weight="700" fill="#1E7A52">سند قبض</text>
      <rect x="20" y="462" width="80" height="62" rx="15" fill="#FEF1E3"/><circle cx="60" cy="480" r="5" fill="none" stroke="#D97A2B" stroke-width="1.5"/><path d="M52 493a8 8 0 0 1 16 0" fill="none" stroke="#D97A2B" stroke-width="1.5"/><text x="60" y="514" font-size="10" font-weight="700" fill="#D97A2B">العملاء</text>
    </g>

    <!-- شريط التبويبات -->
    <line x1="8" y1="552" x2="292" y2="552" stroke="#F1EBDF" stroke-width="1"/>
    <g font-size="8.5" text-anchor="middle">
      <g fill="#E15A30"><path d="M244 568l6-5 6 5v8h-12z" fill="none" stroke="#E15A30" stroke-width="1.5" stroke-linejoin="round"/><text x="250" y="592">الرئيسية</text></g>
      <g fill="#9A8F7E"><path d="M194 566h9l3 3v9h-12z" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="200" y="592">الفواتير</text></g>
      <g fill="#9A8F7E"><rect x="142" y="568" width="16" height="10" rx="2" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="150" y="592">التحصيل</text></g>
      <g fill="#9A8F7E"><circle cx="100" cy="570" r="3.5" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><path d="M94 578a6 6 0 0 1 12 0" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="100" y="592">العملاء</text></g>
      <g fill="#9A8F7E"><rect x="42" y="568" width="15" height="9" rx="2" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="50" y="592">مخزوني</text></g>
    </g>
  </g>
</svg>
