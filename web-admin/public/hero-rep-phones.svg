<svg xmlns="http://www.w3.org/2000/svg" width="786" height="750" viewBox="112 6 786 750" font-family="'IBM Plex Sans Arabic','IBM Plex Sans','Segoe UI','Tajawal',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A2019"/><stop offset="0.55" stop-color="#211913"/><stop offset="1" stop-color="#15110D"/>
    </linearGradient>
    <radialGradient id="gCoral" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#E15A30" stop-opacity="0.55"/><stop offset="1" stop-color="#E15A30" stop-opacity="0"/></radialGradient>
    <radialGradient id="gGreen" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#1E7A52" stop-opacity="0.42"/><stop offset="1" stop-color="#1E7A52" stop-opacity="0"/></radialGradient>
    <radialGradient id="gAmber" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#E0A02C" stop-opacity="0.36"/><stop offset="1" stop-color="#E0A02C" stop-opacity="0"/></radialGradient>
    <linearGradient id="greetAr" x1="1" y1="0" x2="0" y2="0"><stop offset="0" stop-color="#E15A30"/><stop offset="1" stop-color="#1F1A13"/></linearGradient>
    <linearGradient id="greetEn" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#E15A30"/><stop offset="1" stop-color="#1F1A13"/></linearGradient>
    <filter id="ph" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/></filter>
  </defs>

  <!-- خلفية شفّافة: الجوالان يندمجان مع خلفية الصفحة، مع بقاء الظلال الناعمة -->

  <!-- ============ الجوال الأيمن (خلف) — إنجليزي ============ -->
  <g transform="translate(540,42) rotate(4.5)" filter="url(#ph)">
    <rect width="300" height="616" rx="42" fill="#0C0C0D"/>
    <rect x="8" y="8" width="284" height="600" rx="35" fill="#FFFFFF"/>
    <!-- dark app header -->
    <path d="M8,42 a34,34 0 0 1 34,-34 h216 a34,34 0 0 1 34,34 v20 h-284 z" fill="#1F1A13"/>
    <rect x="112" y="14" width="76" height="18" rx="9" fill="#0C0C0D"/>
    <!-- header: EN logo+wordmark left, location right -->
    <rect x="20" y="30" width="22" height="22" rx="6" fill="#E15A30"/><polyline points="25,47 31,41 37,35" stroke="#1F1A13" stroke-width="2.4" fill="none" stroke-linecap="round"/><circle cx="37" cy="35" r="2.4" fill="#FFF3EE"/>
    <text x="50" y="46" font-size="12.5" font-weight="700"><tspan fill="#FFFFFF">Field</tspan><tspan fill="#E15A30"> Sales</tspan></text>
    <circle cx="212" cy="41" r="2.6" fill="#4ADE80"/><text x="220" y="45" font-size="9.5" fill="#CFC6B8">Live</text>
    <path d="M270 34l6 6-6 6M276 40h-14" stroke="#9A8F7E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- greeting -->
    <rect x="20" y="72" width="260" height="70" rx="20" fill="url(#greetEn)"/>
    <circle cx="248" cy="107" r="22" fill="#FFFFFF" fill-opacity="0.16"/><circle cx="248" cy="100" r="7" fill="#FFFFFF"/><path d="M235 121a13 13 0 0 1 26 0z" fill="#FFFFFF"/>
    <text x="36" y="102" font-size="11" fill="#F6DBD0">Hi,</text><text x="36" y="124" font-size="18" font-weight="800" fill="#FFFFFF">Laura</text>

    <!-- collection balance -->
    <rect x="20" y="152" width="260" height="70" rx="18" fill="#F3FBF7" stroke="#CFEEDF" stroke-width="1.4"/>
    <rect x="32" y="172" width="34" height="34" rx="11" fill="#E1F4EA"/><rect x="40" y="182" width="18" height="13" rx="3" fill="none" stroke="#1E7A52" stroke-width="1.6"/><circle cx="54" cy="188" r="1.6" fill="#1E7A52"/>
    <text x="264" y="176" font-size="10.5" fill="#6E6557" text-anchor="end">Your balance</text>
    <text x="264" y="197" font-size="17" font-weight="800" fill="#1E7A52" text-anchor="end">9,755.00</text>
    <text x="264" y="212" font-size="8.5" fill="#9A8F7E" text-anchor="end">To hand over to management</text>

    <!-- today's stats -->
    <text x="20" y="250" font-size="13.5" font-weight="800" fill="#1F1A13">Today's stats</text>
    <g>
      <rect x="20" y="262" width="122" height="76" rx="17" fill="#FBEBE2"/><rect x="30" y="272" width="26" height="26" rx="8" fill="#F6D5C7"/><path d="M36 290l6-7 4 3 6-8" stroke="#E15A30" stroke-width="2" fill="none" stroke-linecap="round"/><text x="30" y="318" font-size="15" font-weight="800" fill="#E15A30">444.99</text><text x="30" y="331" font-size="9" fill="#8A5B45">Sales</text>
      <rect x="158" y="262" width="122" height="76" rx="17" fill="#EAF7F0"/><rect x="168" y="272" width="26" height="26" rx="8" fill="#D3EEDF"/><rect x="174" y="280" width="14" height="10" rx="2" fill="none" stroke="#1E7A52" stroke-width="1.5"/><text x="168" y="318" font-size="15" font-weight="800" fill="#1E7A52">580.00</text><text x="168" y="331" font-size="9" fill="#5E8A73">Collected</text>
      <rect x="20" y="346" width="122" height="76" rx="17" fill="#FEF1E3"/><rect x="30" y="356" width="26" height="26" rx="8" fill="#F8DFC2"/><path d="M37 363h9v11h-9zm2 3h5m-5 3h5" stroke="#D97A2B" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="30" y="402" font-size="16" font-weight="800" fill="#D97A2B">2</text><text x="30" y="415" font-size="9" fill="#A8703A">Invoices</text>
      <rect x="158" y="346" width="122" height="76" rx="17" fill="#F3EEFB"/><rect x="168" y="356" width="26" height="26" rx="8" fill="#E3D9F5"/><rect x="174" y="363" width="14" height="10" rx="2" fill="none" stroke="#7C5CBF" stroke-width="1.4"/><path d="M174 367h14" stroke="#7C5CBF" stroke-width="1.4"/><text x="168" y="402" font-size="16" font-weight="800" fill="#7C5CBF">3</text><text x="168" y="415" font-size="9" fill="#6B57A0">Receipts</text>
    </g>

    <!-- quick actions -->
    <text x="20" y="450" font-size="13.5" font-weight="800" fill="#1F1A13">Quick actions</text>
    <g text-anchor="middle">
      <rect x="20" y="462" width="80" height="62" rx="15" fill="#FBEBE2"/><path d="M53 476h9l4 4v12h-13z" fill="none" stroke="#E15A30" stroke-width="1.6" stroke-linejoin="round"/><text x="60" y="514" font-size="9.5" font-weight="700" fill="#E15A30">Invoice</text>
      <rect x="110" y="462" width="80" height="62" rx="15" fill="#EAF7F0"/><rect x="140" y="477" width="20" height="14" rx="2.5" fill="none" stroke="#1E7A52" stroke-width="1.6"/><path d="M140 482h20" stroke="#1E7A52" stroke-width="1.6"/><text x="150" y="514" font-size="9.5" font-weight="700" fill="#1E7A52">Receipt</text>
      <rect x="200" y="462" width="80" height="62" rx="15" fill="#FEF1E3"/><circle cx="240" cy="480" r="5" fill="none" stroke="#D97A2B" stroke-width="1.5"/><path d="M232 493a8 8 0 0 1 16 0" fill="none" stroke="#D97A2B" stroke-width="1.5"/><text x="240" y="514" font-size="9.5" font-weight="700" fill="#D97A2B">Customers</text>
    </g>

    <!-- bottom nav -->
    <line x1="8" y1="552" x2="292" y2="552" stroke="#F1EBDF" stroke-width="1"/>
    <g font-size="8" text-anchor="middle">
      <g fill="#E15A30"><path d="M44 568l6-5 6 5v8h-12z" fill="none" stroke="#E15A30" stroke-width="1.5" stroke-linejoin="round"/><text x="50" y="592">Home</text></g>
      <g fill="#9A8F7E"><path d="M100 566h9l3 3v9h-12z" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="106" y="592">Invoices</text></g>
      <g fill="#9A8F7E"><rect x="156" y="568" width="16" height="10" rx="2" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="164" y="592">Collect</text></g>
      <g fill="#9A8F7E"><circle cx="220" cy="570" r="3.5" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><path d="M214 578a6 6 0 0 1 12 0" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="220" y="592">Customers</text></g>
      <g fill="#9A8F7E"><rect x="270" y="568" width="15" height="9" rx="2" fill="none" stroke="#9A8F7E" stroke-width="1.4"/><text x="278" y="592">Stock</text></g>
    </g>
  </g>

  <!-- ============ الجوال الأيسر (أمام) — عربي ============ -->
  <g transform="translate(168,80) rotate(-4.5)" filter="url(#ph)">
    <rect width="300" height="616" rx="42" fill="#0C0C0D"/>
    <rect x="8" y="8" width="284" height="600" rx="35" fill="#FFFFFF"/>
    <path d="M8,42 a34,34 0 0 1 34,-34 h216 a34,34 0 0 1 34,34 v20 h-284 z" fill="#1F1A13"/>
    <rect x="112" y="14" width="76" height="18" rx="9" fill="#0C0C0D"/>
    <!-- header: AR logo+wordmark right, location left -->
    <rect x="258" y="30" width="22" height="22" rx="6" fill="#E15A30"/><polyline points="263,47 269,41 275,35" stroke="#1F1A13" stroke-width="2.4" fill="none" stroke-linecap="round"/><circle cx="275" cy="35" r="2.4" fill="#FFF3EE"/>
    <text x="250" y="46" font-size="12.5" font-weight="700" text-anchor="end"><tspan fill="#FFFFFF">Field</tspan><tspan fill="#E15A30"> Sales</tspan></text>
    <text x="80" y="45" font-size="9.5" fill="#CFC6B8" text-anchor="end">نشط</text><circle cx="88" cy="41" r="2.6" fill="#4ADE80"/>
    <path d="M30 34l-6 6 6 6M24 40h14" stroke="#9A8F7E" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- الترحيب -->
    <rect x="20" y="72" width="260" height="70" rx="20" fill="url(#greetAr)"/>
    <circle cx="52" cy="107" r="22" fill="#FFFFFF" fill-opacity="0.16"/><circle cx="52" cy="100" r="7" fill="#FFFFFF"/><path d="M39 121a13 13 0 0 1 26 0z" fill="#FFFFFF"/>
