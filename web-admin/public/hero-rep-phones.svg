      <rect x="110" y="426" width="80" height="58" rx="15" fill="#EAF7F0"/><path d="M150 438v16m5-12h-8a2 2 0 0 0 0 4h6a2 2 0 0 1 0 4h-8" stroke="#1E7A52" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="150" y="476" font-size="10" font-weight="600" fill="#1E7A52" text-anchor="middle">سند قبض</text>
      <rect x="22" y="426" width="80" height="58" rx="15" fill="#FEF1E3"/><circle cx="62" cy="443" r="5" stroke="#D97A2B" stroke-width="1.5" fill="none"/><path d="M54 456a8 8 0 0 1 16 0" stroke="#D97A2B" stroke-width="1.5" fill="none"/><text x="62" y="476" font-size="10" font-weight="600" fill="#D97A2B" text-anchor="middle">العملاء</text>
