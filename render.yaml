databases:
  - name: dsd-db
    # يطابق الخطة الحيّة المدفوعة (Basic-256mb). كان "free" (قديم) فيرفض Blueprint sync
    # تخفيض قاعدة الإنتاج المدفوعة إلى المجانية = فشل مزامنة + خطر تخفيض كامن. المواءمة تُزيلهما.
    plan: basic-256mb
    databaseName: dsd_sales
    user: dsd_user

services:
  - type: web
    name: dsd-backend
    runtime: node
    rootDir: backend
    plan: starter # يطابق الخطة الحيّة المدفوعة (كان "free" قديماً فيفشل Blueprint sync)
    # --include=dev إلزامي: Render يضبط NODE_ENV=production أثناء البناء وnpm الحديث عندها
    # يتخطى devDependencies (typescript + prisma CLI) فيفشل البناء أو يجلب npx نسخة prisma
    # أحدث غير متوافقة مع @prisma/client المثبّت (أخطاء tenantId:never التاريخية).
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # db push بلا --accept-data-loss: يطبّق التغييرات الإضافية فقط، ويُفشل النشر عند أي تغيير مدمّر
    # (حذف عمود/جدول) بدل تنفيذه صامتاً على بيانات الإنتاج — التغيير المدمّر يتطلّب migration مقصودة.
    startCommand: npx prisma db push && node dist/index.js
    # ── فلتر البناء: توفير دقائق Render (Build Pipeline Minutes) ───────────────
    # لا يُعاد بناء الباك-إند إلا حين يتغيّر كود backend/ فعلاً. قبل هذا الفلتر
    # كان كل push يعيد البناء الكامل (npm install --include=dev + prisma generate
    # + tsc) حتى لو لمس التغيير web-admin أو wa-bridge (المحلّي) أو ملفات SEO فقط —
    # ~نصف عمليات البناء كانت مهدورة. المسارات نسبيّة لجذر المستودع (لا لـ rootDir).
    buildFilter:
      paths:
        - backend/**
      ignoredPaths:
        - backend/**/*.md
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsd-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # البريد — يكفي ضبط RESEND_API_KEY (يُدخَل يدوياً) لتفعيل الإرسال. أو SMTP_* كبديل.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: "FieldSales <info@fieldsa.net>"
      - key: MAIL_TO
        value: "info@fieldsa.net"
      - key: SUPPORT_EMAIL
        value: "help@fieldsa.net"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FRONTEND_URL
        value: "https://fieldsa.net,https://www.fieldsa.net"



