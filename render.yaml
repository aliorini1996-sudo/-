databases:
  - name: dsd-db
    plan: free
    databaseName: dsd_sales
    user: dsd_user

services:
  - type: web
    name: dsd-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsd-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://dsd-sales.vercel.app
