databases:
  - name: dsd-db
    plan: free
    databaseName: dsd_sales
    user: dsd_user

services:
  - type: web
    name: dsd-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    # db push (إضافي وآمن، بلا --accept-data-loss فيتوقّف عند أي تغيير مدمّر) لتطبيق تغييرات المخطط عند النشر
    startCommand: npx prisma db push && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dsd-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # البريد — يكفي ضبط RESEND_API_KEY (يُدخَل يدوياً) لتفعيل الإرسال. أو SMTP_* كبديل.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: "FieldSales <info@fieldsa.net>"
      - key: MAIL_TO
        value: "info@fieldsa.net"
      - key: SUPPORT_EMAIL
        value: "help@fieldsa.net"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 465
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FRONTEND_URL
        value: "https://fieldsa.net,https://www.fieldsa.net"



